# Flash + debug the Daisy Seed's QSPI flash (IS25LP064A, 8 MB) over ST-Link / SWD - no USB DFU, no
# BOOT+RESET button dance. The stock OpenOCD stm32h7x.cfg only programs the STM32's INTERNAL flash
# (0x08000000); Daisy apps execute-in-place from QSPI (memory-mapped at 0x90000000, app at 0x90040000),
# which needs the `stmqspi` driver pointed at the H7 QUADSPI peripheral (0x52005000). That is why
# `make program` errors for a BOOT_QSPI app and the repo flashes over DFU instead.
#
# Key trick: stmqspi can only talk to the chip when the QUADSPI controller (clock + GPIOF/G AF pins) is
# already configured. The Daisy bootloader configures QUADSPI (it memory-maps QSPI to run apps), so we
# ATTACH to the already-running target and `halt` - we never `reset halt`, which would drop us at the
# bootloader's reset vector with QUADSPI in its unconfigured power-on state where stmqspi reads garbage.
# Prereq: the board has booted at least once since power-on (so the bootloader ran and set up QUADSPI).
#
# Usage (see also `make -f Makefile.chuck program-swd`):
#   openocd -f daisy_qspi.cfg -c "init; daisy_program /abs/path/to/build/harness_chuck.bin"
# To just attach and inspect (read PC / fault regs), source this and `init; halt` yourself.

source [find interface/stlink.cfg]
transport select hla_swd
source [find target/stm32h7x.cfg]

# Attach to the running target without perturbing it; `reset run` at the end uses the cortex-m
# sysresetreq (software) reset that stm32h7x.cfg already configures, so no SRST wire is required.
reset_config none separate

# stm32h7x.cfg's reset-init / examine-end events poke DBGMCU (0x5C001000, D3 domain) to keep debug
# alive across reset/standby. On this hla(ST-Link)+QSPI setup that read can fail and abort the whole
# `reset` (read at 0x5c001004 failed). We don't need those niceties, so neutralize the two events.
stm32h7x.cpu0 configure -event reset-init {}
stm32h7x.cpu0 configure -event examine-end {}

# IS25LP064A QSPI NOR (8 MB), memory-mapped at 0x90000000; H7 QUADSPI registers at 0x52005000.
# size/chip_width/bus_width = 0 -> auto-detect via SFDP/JEDEC ID.
flash bank qspi0 stmqspi 0x90000000 0 0 0 stm32h7x.cpu0 0x52005000

# Write a BOOT_QSPI app image (raw .bin) to QSPI and reboot into it via the bootloader.
#   bin  - path to build/<target>.bin (objcopy -O binary; starts at the app base)
#   addr - QSPI load address (default 0x90040000, where the Daisy bootloader expects the app)
proc daisy_program {bin {addr 0x90040000}} {
    halt
    flash probe 0
    flash write_image erase $bin $addr
    reset run
    shutdown
}
